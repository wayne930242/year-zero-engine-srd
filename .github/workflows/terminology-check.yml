name: Terminology Check

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  terminology:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync

      - name: Validate glossary schema
        run: uv run python scripts/validate_glossary.py

      - name: Terminology consistency gate
        run: uv run python scripts/term_read.py --fail-on-forbidden
